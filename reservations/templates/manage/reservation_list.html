<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>予約一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h1>予約一覧</h1>

<p><a href="{% url 'reservations:manage_home' %}">← 戻る</a></p>

<table class="table table-striped table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>予約枠</th>
            <th>氏名</th>
            <th>人数</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for reservation in reservations %}
        <tr>
            <td>{{ reservation.id }}</td>
            <td>{{ reservation.slot }}</td>
            <td>{{ reservation.name|default:"未入力" }}</td>
            <td>{{ reservation.people }}</td>
            <td>
                <form method="post" action="{% url 'reservations:delete_reservation' reservation.id %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"
                    onclick="return confirm('本当に削除しますか？')">
                        削除
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
