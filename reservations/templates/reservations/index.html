{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="stylesheet" href="{% static 'reservations/style.css' %}">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>予約サイト</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- 自作CSS -->
  <link rel="stylesheet" href="{% static 'reservations/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'reservations/css/layout.css' %}">
  <link rel="stylesheet" href="{% static 'reservations/css/booking.css' %}">
  <link rel="stylesheet" href="{% static 'reservations/css/admin.css' %}">

  <!-- flatpickr (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

</head>

<body class="bg-light">

  <!-- ローディング画面 -->
  <div id="page-loading">
    <div class="loading-spinner"></div>
  </div>

  <main class="container py-4">
    <!-- 全体を中央寄せにする幅（2枚目みたいに） -->
    <div class="mx-auto" style="max-width: 980px;">

      <!-- ✅ ここだけ白い枠（予約一覧〜二重予約） -->
      <section class="bg-white border rounded-4 shadow-sm p-4 p-md-5 mb-4 intro-card">
        <h1 class="h3 fw-bold mb-3">予約枠一覧</h1>

        <!-- ここを灰色に -->
        <p class=" mb-3 description-line mb-3">
          管理画面で作った予約枠を一覧表示し、空きがあれば予約できます。（満席は予約不可）<br>
          予約はPOST＋DBロックで二重予約を防止しています。
        </p>

        <!-- 目立たなくていい所は薄めに -->
        <ul class="feature-list mb-0">
          <li>予約枠一覧（DB連携）</li>
          <li>満席制御（残り0は予約不可）</li>
          <li>予約処理（POST）</li>
          <li>二重予約（transaction + select_for_update）</li>
        </ul>
      </section>

      <!-- 日付フィルター（白枠とは別） -->
      <section class="bg-white border rounded-4 shadow-sm p-3 p-md-4 mb-4">
        <form id="filterForm" method="get" class="row g-2 align-items-end">
          <div class="col-12 col-md-7">
            <label for="date-picker" class="form-label small fw-semibold mb-1">日付</label>
            <input
              id="date-picker"
              type="text"
              name="date"
              placeholder="日付を選択"
              value="{{ qdate|date:'Y-m-d' }}"
              class="form-control"
              autocomplete="off"
            />
          </div>

          <div class="col-12 col-md-auto">
            <button type="button" id="showBtn" class="btn btn-primary w-100">表示</button>
          </div>

          <div class="col-12 col-md-auto">
            <a href="{% url 'reservations:index' %}" class="btn btn-outline-secondary w-100">リセット</a>
          </div>
        </form>
      </section>

      <!-- Python(Django) -> JS に渡す配列（超重要） -->
      {{ available_dates|json_script:"available-dates" }}

      <!-- 予約枠一覧 -->
      <section class="d-grid gap-3">
        <div id="slotBox">
          {% include "reservations/_slots_list.html" %}
        </div>
      </section>

    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

  <script id="date-status-date" type="application/json">
    {{ date_status_json|safe }}
  </script>

  <!-- 自作JS -->
  <script defer src="{% static 'reservations/js/datepicker.js' %}"></script>

  <script>
  window.addEventListener("load", function() {
    setTimeout(function(){
      document.getElementById("loading").style.display = "none";
    }, 2000);
  });
  </script>

</body>
</html>
